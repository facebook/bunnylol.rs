name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run cargo check
        run: cargo check --all-features

      - name: Run cargo test
        run: cargo test --all-features

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

  copyright:
    name: Copyright Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check copyright headers
        run: |
          is_text_file() {
            case "$(file --brief --mime-type "$1")" in
              text/*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          is_exempt_file() {
            case "$1" in
              LICENSE|*.json)
                return 0
                ;;
            esac

            if ! is_text_file "$1"; then
              return 0
            fi

            return 1
          }

          missing=()
          while IFS= read -r -d '' file; do
            if is_exempt_file "$file"; then
              continue
            fi

            if ! head -20 "$file" | grep -q "Copyright (c) Meta Platforms, Inc. and affiliates"; then
              missing+=("$file")
            fi
          done < <(git ls-files -z)

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::The following files are missing the copyright header:"
            for f in "${missing[@]}"; do
              echo "  $f"
            done
            echo ""
            echo "Each tracked file must include this header near the top unless it is explicitly exempted:"
            echo "/*"
            echo " * Copyright (c) Meta Platforms, Inc. and affiliates."
            echo " *"
            echo " * This source code is licensed under the MIT license found in the"
            echo " * LICENSE file in the root directory of this source tree."
            echo " */"
            exit 1
          fi
          echo "All tracked files that require copyright headers have them."
